name: Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8

      - name: Lint Python with Flake8
        run: flake8 lambda/ --max-line-length=130 --extend-ignore=E302

      - name: Run Mock Cost Analysis
        working-directory: lambda
        env:
          MOCK_MODE: "true"
          REPORT_BUCKET: "mock-bucket"
          PROJECT_NAME: "ml-cost-optimizer"
        run: |
          python -c "
          from main import handler
          result = handler({}, {})
          import json
          body = json.loads(result['body'])
          print('=== Mock Test Results ===')
          print(f'Total cost:        \${body[\"total_cost\"]}')
          print(f'Potential savings: \${body[\"potential_savings\"]}')
          print(f'Savings %:         {body[\"savings_percentage\"]}%')
          print(f'Recommendations:   {body[\"recommendations_count\"]}')
          assert result['statusCode'] == 200, 'Handler failed!'
          assert body['potential_savings'] > 0, 'No savings detected!'
          print('=== All tests passed! ===')
          "

      - name: Terraform Format Check
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.0.0

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/orm fmt -check -recursive terraform/
